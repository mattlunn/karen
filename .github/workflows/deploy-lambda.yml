name: Deploy Lambda

on:
  workflow_call:
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      LAMBDA_FUNCTION_NAME:
        required: true
      NEW_RELIC_API_KEY:
        required: true
      NEW_RELIC_LICENSE_KEY:
        required: true

jobs:
  deploy:
    name: Deploy Lambda
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build Lambda
        working-directory: lambdas/smart-home/src
        run: |
          npm ci
          npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Deploy Lambda
        working-directory: lambdas/smart-home/dist
        run: |
          zip -r lambda.zip .
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --zip-file fileb://lambda.zip
        env:
          LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}

      - name: Configure New Relic instrumentation
        run: |
          pip3 install newrelic-lambda-cli
          aws lambda wait function-updated \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region eu-west-1
          newrelic-lambda layers install \
            --function "$LAMBDA_FUNCTION_NAME" \
            --nr-account-id "$NEW_RELIC_ACCOUNT_ID" \
            --nr-api-key "$NEW_RELIC_API_KEY" \
            --license-key "$NEW_RELIC_LICENSE_KEY" \
            --aws-region eu-west-1 \
            --apm \
            --upgrade
        env:
          LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
          NEW_RELIC_API_KEY: ${{ secrets.NEW_RELIC_API_KEY }}
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
          NEW_RELIC_ACCOUNT_ID: ${{ vars.NEW_RELIC_ACCOUNT_ID }}

# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Karen

on: [push, pull_request]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server/src

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run codegen
      - run: npm run lint
      - run: npm run test
      - run: npm run build

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'

        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata (tags, labels) for Docker
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'

        id: meta
        uses: docker/metadata-action@v5
        with:
          images: mattlunn/karen
          flavor: |
            latest=true
          tags: |
            type=sha,prefix=
      
      - name: Build and push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'

        uses: docker/build-push-action@v6
        with:
          context: ./server/dist
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-application:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Trigger Deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          curl -X POST -H "Authorization: Bearer ${{ secrets.DEPLOYMENT_TOKEN }}" ${{ secrets.DEPLOYMENT_WEBHOOK }}

  deploy-lambda-production:
    name: Deploy Lambda (Production)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    uses: ./.github/workflows/deploy-lambda.yml
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME_PRODUCTION }}
      NEW_RELIC_API_KEY: ${{ secrets.NEW_RELIC_API_KEY }}
